<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL编解码工具 - AI智能技术知识平台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0b1120 0%, #111827 50%, #0f1a2e 100%);
      color: #e2e8f0;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      padding: 30px 0;
      margin-bottom: 30px;
      border-bottom: 2px solid #3b82f6;
    }

    .header h1 {
      color: #60a5fa;
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .header p {
      color: #94a3b8;
      font-size: 1.1em;
    }

    .back-links {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .back-link {
      display: inline-block;
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: #60a5fa;
    }

    /* 转换器布局 */
    .converter-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      margin-bottom: 30px;
    }

    .converter-box {
      background: linear-gradient(135deg, #0b1120 0%, #111827 100%);
      border: 2px solid #3b82f6;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
    }

    .box-title {
      color: #60a5fa;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-label {
      color: #3b82f6;
      font-size: 14px;
      margin-bottom: 8px;
      display: block;
      font-weight: 600;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      background: #0b1120;
      border: 2px solid #2563eb;
      border-radius: 8px;
      padding: 15px;
      color: #e2e8f0;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      resize: vertical;
      transition: all 0.3s;
      line-height: 1.5;
    }

    textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .radio-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .radio-item input[type="radio"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .radio-item label {
      color: #94a3b8;
      cursor: pointer;
      font-size: 14px;
    }

    button {
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.4);
      width: 100%;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.6);
    }

    .secondary-btn {
      background: rgba(59, 130, 246, 0.3);
      color: #60a5fa;
      border: 1px solid #3b82f6;
      margin-top: 8px;
    }

    /* URL解析区 */
    .parse-section {
      background: linear-gradient(135deg, #0b1120 0%, #111827 100%);
      border: 2px solid #3b82f6;
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 30px;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
    }

    .parse-result {
      background: #0b1120;
      border: 2px solid #2563eb;
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
    }

    .url-part {
      display: flex;
      margin-bottom: 12px;
      padding: 10px;
      background: rgba(59, 130, 246, 0.05);
      border-radius: 4px;
    }

    .url-part-label {
      color: #3b82f6;
      font-weight: 600;
      width: 120px;
      flex-shrink: 0;
    }

    .url-part-value {
      color: #e2e8f0;
      font-family: 'Consolas', 'Monaco', monospace;
      word-break: break-all;
      flex: 1;
    }

    .params-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    .params-table th {
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
      padding: 10px;
      text-align: left;
      font-weight: 600;
    }

    .params-table td {
      padding: 10px;
      border-bottom: 1px solid #333;
      color: #e2e8f0;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
    }

    .params-table tr:hover {
      background: rgba(59, 130, 246, 0.05);
    }

    /* 提示框 */
    .tip-box {
      background: rgba(96, 165, 250, 0.15);
      border: 2px solid #60a5fa;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .tip-icon {
      font-size: 36px;
    }

    .tip-content {
      flex: 1;
    }

    .tip-content h3 {
      color: #60a5fa;
      margin-bottom: 8px;
      font-size: 16px;
    }

    .tip-content p {
      color: #94a3b8;
      line-height: 1.6;
      margin: 0;
      font-size: 14px;
    }

    .message {
      position: fixed;
      top: 100px;
      right: 30px;
      padding: 15px 25px;
      border-radius: 8px;
      font-weight: 600;
      z-index: 10000;
      animation: slideIn 0.3s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .message.success {
      background: rgba(0, 255, 0, 0.2);
      color: #00ff00;
      border: 2px solid #00ff00;
    }

    .message.error {
      background: rgba(255, 68, 68, 0.2);
      color: #ff4444;
      border: 2px solid #ff4444;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @media screen and (max-width: 768px) {
      .converter-section {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 1.8em;
      }

      .url-part {
        flex-direction: column;
      }

      .url-part-label {
        width: 100%;
        margin-bottom: 5px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="back-links">
      <a href="/#/" class="back-link">← 返回主站</a>
      <a href="index.html" class="back-link">← 返回工具集</a>
    </div>
    
    <div class="header">
      <h1>🔗 URL编解码工具</h1>
      <p>URL编码、解码、参数解析与格式化</p>
    </div>

    <div class="tip-box">
      <div class="tip-icon">💡</div>
      <div class="tip-content">
        <h3>快速开始</h3>
        <p>
          • <strong>encodeURI</strong>：用于编码完整URL，不编码某些特殊字符（如 : / ? # 等）<br>
          • <strong>encodeURIComponent</strong>：用于编码URL参数值，会编码所有特殊字符
        </p>
      </div>
    </div>

    <!-- URL编码解码区 -->
    <div class="converter-section">
      <!-- 编码 -->
      <div class="converter-box">
        <div class="box-title">🔒 URL 编码</div>
        
        <div class="input-group">
          <label class="input-label">编码方式</label>
          <div class="radio-group">
            <div class="radio-item">
              <input type="radio" name="encodeType" id="encodeURI" value="uri" checked>
              <label for="encodeURI">encodeURI</label>
            </div>
            <div class="radio-item">
              <input type="radio" name="encodeType" id="encodeURIComponent" value="component">
              <label for="encodeURIComponent">encodeURIComponent</label>
            </div>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">输入URL或文本</label>
          <textarea id="encodeInput" placeholder="请输入需要编码的URL或文本...">https://example.com/search?q=搜索关键词&category=技术</textarea>
        </div>

        <button onclick="encodeURL()">🔒 开始编码</button>
        <button class="secondary-btn" onclick="copyText('encodeInput')">📋 复制输入</button>
      </div>

      <!-- 解码 -->
      <div class="converter-box">
        <div class="box-title">🔓 URL 解码</div>
        
        <div class="input-group">
          <label class="input-label">编码后的URL</label>
          <textarea id="decodeInput" placeholder="请输入需要解码的URL...">https://example.com/search?q=%E6%90%9C%E7%B4%A2%E5%85%B3%E9%94%AE%E8%AF%8D&category=%E6%8A%80%E6%9C%AF</textarea>
        </div>

        <button onclick="decodeURL()">🔓 开始解码</button>
        <button class="secondary-btn" onclick="copyText('decodeInput')">📋 复制输入</button>
      </div>
    </div>

    <!-- URL解析区 -->
    <div class="parse-section">
      <div class="box-title">📊 URL 解析与分析</div>
      
      <div class="input-group">
        <label class="input-label">输入完整URL进行解析</label>
        <textarea id="parseInput" placeholder="请输入完整的URL..." style="min-height: 80px;">https://example.com:8080/path/to/page?param1=value1&param2=value2&name=测试#section</textarea>
      </div>

      <button onclick="parseURL()">📊 解析URL</button>

      <div class="parse-result" id="parseResult" style="display: none;">
        <div id="urlParts"></div>
        <div id="urlParams" style="margin-top: 20px;"></div>
      </div>
    </div>
  </div>

  <script>
    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      // 自动执行一次编码和解码示例
      encodeURL();
      decodeURL();
    });

    // URL编码
    function encodeURL() {
      const input = document.getElementById('encodeInput').value.trim();
      
      if (!input) {
        showMessage('请输入需要编码的内容', 'error');
        return;
      }

      try {
        const encodeType = document.querySelector('input[name="encodeType"]:checked').value;
        let encoded;
        
        if (encodeType === 'uri') {
          encoded = encodeURI(input);
        } else {
          encoded = encodeURIComponent(input);
        }
        
        document.getElementById('decodeInput').value = encoded;
        showMessage('✓ 编码成功', 'success');
      } catch (e) {
        showMessage('✗ 编码失败: ' + e.message, 'error');
      }
    }

    // URL解码
    function decodeURL() {
      const input = document.getElementById('decodeInput').value.trim();
      
      if (!input) {
        showMessage('请输入需要解码的内容', 'error');
        return;
      }

      try {
        const decoded = decodeURIComponent(input);
        document.getElementById('encodeInput').value = decoded;
        showMessage('✓ 解码成功', 'success');
      } catch (e) {
        // 尝试使用 decodeURI
        try {
          const decoded = decodeURI(input);
          document.getElementById('encodeInput').value = decoded;
          showMessage('✓ 解码成功', 'success');
        } catch (e2) {
          showMessage('✗ 解码失败: ' + e2.message, 'error');
        }
      }
    }

    // URL解析
    function parseURL() {
      const input = document.getElementById('parseInput').value.trim();
      
      if (!input) {
        showMessage('请输入URL', 'error');
        return;
      }

      try {
        const url = new URL(input);
        
        // 显示URL各部分
        const partsHtml = `
          <div class="url-part">
            <div class="url-part-label">完整URL:</div>
            <div class="url-part-value">${escapeHtml(url.href)}</div>
          </div>
          <div class="url-part">
            <div class="url-part-label">协议 (protocol):</div>
            <div class="url-part-value">${escapeHtml(url.protocol)}</div>
          </div>
          <div class="url-part">
            <div class="url-part-label">主机名 (hostname):</div>
            <div class="url-part-value">${escapeHtml(url.hostname)}</div>
          </div>
          ${url.port ? `<div class="url-part">
            <div class="url-part-label">端口 (port):</div>
            <div class="url-part-value">${escapeHtml(url.port)}</div>
          </div>` : ''}
          <div class="url-part">
            <div class="url-part-label">路径 (pathname):</div>
            <div class="url-part-value">${escapeHtml(url.pathname)}</div>
          </div>
          ${url.search ? `<div class="url-part">
            <div class="url-part-label">查询字符串 (search):</div>
            <div class="url-part-value">${escapeHtml(url.search)}</div>
          </div>` : ''}
          ${url.hash ? `<div class="url-part">
            <div class="url-part-label">哈希 (hash):</div>
            <div class="url-part-value">${escapeHtml(url.hash)}</div>
          </div>` : ''}
        `;
        
        document.getElementById('urlParts').innerHTML = partsHtml;
        
        // 解析查询参数
        const params = new URLSearchParams(url.search);
        if (params.toString()) {
          let paramsHtml = '<h4 style="color: #60a5fa; margin-bottom: 10px;">🔍 查询参数</h4>';
          paramsHtml += '<table class="params-table">';
          paramsHtml += '<tr><th>参数名</th><th>参数值</th></tr>';
          
          for (const [key, value] of params.entries()) {
            paramsHtml += `<tr>
              <td>${escapeHtml(key)}</td>
              <td>${escapeHtml(value)}</td>
            </tr>`;
          }
          
          paramsHtml += '</table>';
          document.getElementById('urlParams').innerHTML = paramsHtml;
        } else {
          document.getElementById('urlParams').innerHTML = '<p style="color: #888; text-align: center; padding: 20px;">该URL没有查询参数</p>';
        }
        
        document.getElementById('parseResult').style.display = 'block';
        showMessage('✓ 解析成功', 'success');
        
      } catch (e) {
        showMessage('✗ URL格式错误: ' + e.message, 'error');
        document.getElementById('parseResult').style.display = 'none';
      }
    }

    // 复制文本
    function copyText(elementId) {
      const element = document.getElementById(elementId);
      if (!element.value) {
        showMessage('没有可复制的内容', 'error');
        return;
      }
      
      element.select();
      document.execCommand('copy');
      showMessage('✓ 已复制到剪贴板', 'success');
    }

    // 转义HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 显示消息
    function showMessage(message, type) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${type}`;
      messageDiv.textContent = message;
      document.body.appendChild(messageDiv);
      
      setTimeout(() => {
        messageDiv.style.animation = 'slideOut 0.3s ease';
        setTimeout(() => document.body.removeChild(messageDiv), 300);
      }, 2000);
    }
  </script>
</body>
</html>
