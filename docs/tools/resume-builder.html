<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>程序员简历制作工具 - wychmod Developer Workspace</title>
  <meta name="description" content="专为程序员打造的在线简历生成器，支持多种专业模板、技术技能展示、项目经验、GitHub链接等，一键导出PDF">
  <meta name="keywords" content="程序员简历,简历生成器,技术简历,简历模板,PDF简历,开发者简历,IT简历">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --accent-main: #6d4aff;
      --accent-light: #0b6bcb;
      --accent-dark: #5636d7;
      --bg-primary: #f7f6f3;
      --bg-secondary: #fbfaf8;
      --bg-tertiary: #ffffff;
      --text-primary: #37352f;
      --text-secondary: #5f5d57;
      --text-tertiary: #999;
      --success: #28a745;
      --danger: #dc3545;
      --info: #17a2b8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #f7f6f3 0%, #fbfaf8 50%, #fbfaf8 100%);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
    }

    /* 导航链接 */
    .nav-links {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent-main);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      padding: 10px 20px;
      border: 2px solid var(--accent-dark);
      border-radius: 25px;
      transition: all 0.3s ease;
      background: rgba(59, 130, 246, 0.1);
    }

    .back-link:hover {
      color: var(--accent-light);
      border-color: var(--accent-light);
      transform: translateX(-3px);
      box-shadow: 0 4px 15px rgba(109, 74, 255, 0.12);
    }

    /* 头部 */
    .header {
      text-align: center;
      padding: 30px 0;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--accent-main);
    }

    .header h1 {
      color: var(--accent-light);
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(96, 165, 250, 0.3);
    }

    .header p {
      color: var(--text-secondary);
      font-size: 1.1em;
    }

    /* 工具栏 */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 25px;
      padding: 20px;
      background: var(--bg-secondary);
      border: 2px solid var(--accent-dark);
      border-radius: 12px;
      align-items: center;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toolbar-group label {
      color: var(--accent-main);
      font-weight: 600;
      font-size: 14px;
    }

    select {
      background: var(--bg-tertiary);
      border: 2px solid var(--accent-dark);
      border-radius: 8px;
      padding: 10px 15px;
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      min-width: 150px;
    }

    select:focus {
      outline: none;
      border-color: var(--accent-main);
    }

    .btn {
      background: linear-gradient(135deg, var(--accent-dark), var(--accent-main));
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(109, 74, 255, 0.22);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(109, 74, 255, 0.35);
      background: linear-gradient(135deg, var(--accent-main), var(--accent-light));
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--accent-main);
      border: 2px solid var(--accent-dark);
      box-shadow: none;
    }

    .btn-secondary:hover {
      background: rgba(109, 74, 255, 0.10);
      border-color: var(--accent-main);
    }

    .btn-success {
      background: linear-gradient(135deg, #1e7e34, var(--success));
      color: #fff;
    }

    .btn-success:hover {
      background: linear-gradient(135deg, var(--success), #34ce57);
    }

    .btn-danger {
      background: linear-gradient(135deg, #bd2130, var(--danger));
      color: #fff;
    }

    .btn-danger:hover {
      background: linear-gradient(135deg, var(--danger), #e4606d);
    }

    /* 主编辑区 */
    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
    }

    @media (max-width: 1200px) {
      .main-content {
        grid-template-columns: 1fr;
      }
    }

    /* 编辑面板 */
    .edit-panel {
      background: var(--bg-secondary);
      border: 2px solid var(--accent-main);
      border-radius: 12px;
      overflow: hidden;
    }

    .panel-header {
      background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary));
      padding: 15px 20px;
      border-bottom: 2px solid var(--accent-dark);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-title {
      color: var(--accent-light);
      font-size: 1.2em;
      font-weight: 600;
    }

    .panel-content {
      padding: 20px;
      max-height: calc(100vh - 350px);
      overflow-y: auto;
    }

    /* 表单分组 */
    .form-section {
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--bg-tertiary);
    }

    .form-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }

    .section-title {
      color: var(--accent-main);
      font-size: 1.1em;
      font-weight: 600;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      background: var(--bg-primary);
      border: 2px solid var(--bg-tertiary);
      border-radius: 8px;
      padding: 12px 15px;
      color: var(--text-primary);
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent-main);
      box-shadow: 0 0 0 3px rgba(109, 74, 255, 0.10);
    }

    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    /* 技能标签输入 */
    .skills-input-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      background: var(--bg-primary);
      border: 2px solid var(--bg-tertiary);
      border-radius: 8px;
      padding: 10px;
      min-height: 50px;
      cursor: text;
    }

    .skills-input-container:focus-within {
      border-color: var(--accent-main);
      box-shadow: 0 0 0 3px rgba(109, 74, 255, 0.10);
    }

    .skill-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(109, 74, 255, 0.10);
      color: var(--accent-main);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .skill-tag .remove-skill {
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      opacity: 0.7;
    }

    .skill-tag .remove-skill:hover {
      opacity: 1;
    }

    .skills-input {
      flex: 1;
      min-width: 100px;
      border: none !important;
      background: transparent !important;
      padding: 6px !important;
      box-shadow: none !important;
    }

    /* 动态列表项 */
    .list-item {
      background: var(--bg-primary);
      border: 1px solid var(--bg-tertiary);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      position: relative;
    }

    .list-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .list-item-title {
      color: var(--accent-main);
      font-weight: 600;
    }

    .list-item-actions {
      display: flex;
      gap: 8px;
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-size: 14px;
    }

    .add-item-btn {
      width: 100%;
      padding: 12px;
      background: rgba(59, 130, 246, 0.1);
      border: 2px dashed var(--accent-dark);
      border-radius: 8px;
      color: var(--accent-main);
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
    }

    .add-item-btn:hover {
      background: rgba(109, 74, 255, 0.10);
      border-color: var(--accent-main);
    }

    /* 预览面板 */
    .preview-panel {
      background: #fff;
      border: 2px solid var(--accent-main);
      border-radius: 12px;
      overflow: hidden;
    }

    .preview-content {
      background: #fff;
      color: #333;
      padding: 40px;
      min-height: calc(100vh - 350px);
      max-height: calc(100vh - 350px);
      overflow-y: auto;
    }

    /* 简历模板样式 - 经典模板 */
    .resume-template.classic {
      font-family: 'Georgia', serif;
    }

    .resume-template.classic .resume-header {
      text-align: center;
      padding-bottom: 20px;
      border-bottom: 2px solid #333;
      margin-bottom: 25px;
    }

    .resume-template.classic .resume-name {
      font-size: 32px;
      font-weight: 700;
      color: #fbfaf8;
      margin-bottom: 8px;
    }

    .resume-template.classic .resume-title {
      font-size: 18px;
      color: #555;
      margin-bottom: 15px;
    }

    .resume-template.classic .contact-info {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      font-size: 13px;
      color: #666;
    }

    .resume-template.classic .contact-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .resume-template.classic .section {
      margin-bottom: 25px;
    }

    .resume-template.classic .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #fbfaf8;
      text-transform: uppercase;
      border-bottom: 1px solid #ccc;
      padding-bottom: 8px;
      margin-bottom: 15px;
    }

    .resume-template.classic .summary-text {
      font-size: 14px;
      line-height: 1.8;
      color: #444;
    }

    .resume-template.classic .skills-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .resume-template.classic .skill-category h4 {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .resume-template.classic .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .resume-template.classic .skill-tag-preview {
      background: #f0f0f0;
      color: #333;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
    }

    .resume-template.classic .experience-item,
    .resume-template.classic .project-item,
    .resume-template.classic .education-item {
      margin-bottom: 20px;
    }

    .resume-template.classic .item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .resume-template.classic .item-title {
      font-size: 15px;
      font-weight: 600;
      color: #fbfaf8;
    }

    .resume-template.classic .item-subtitle {
      font-size: 14px;
      color: #555;
    }

    .resume-template.classic .item-date {
      font-size: 13px;
      color: #666;
      white-space: nowrap;
    }

    .resume-template.classic .item-description {
      font-size: 13px;
      color: #444;
      line-height: 1.7;
    }

    .resume-template.classic .item-description ul {
      padding-left: 20px;
      margin: 8px 0;
    }

    .resume-template.classic .item-description li {
      margin-bottom: 4px;
    }

    .resume-template.classic .project-links {
      margin-top: 8px;
    }

    .resume-template.classic .project-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #0066cc;
      text-decoration: none;
      margin-right: 15px;
    }

    .resume-template.classic .tech-stack {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
    }

    .resume-template.classic .tech-stack strong {
      color: #333;
    }

    /* 简历模板样式 - 现代模板 */
    .resume-template.modern {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    .resume-template.modern .resume-header {
      background: linear-gradient(135deg, #2c3e50, #3498db);
      color: #fff;
      padding: 30px;
      margin: -40px -40px 30px -40px;
    }

    .resume-template.modern .resume-name {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .resume-template.modern .resume-title {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    .resume-template.modern .contact-info {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      font-size: 14px;
    }

    .resume-template.modern .contact-item {
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0.9;
    }

    .resume-template.modern .section {
      margin-bottom: 30px;
    }

    .resume-template.modern .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 15px;
      padding-left: 15px;
      border-left: 4px solid #3498db;
    }

    .resume-template.modern .summary-text {
      font-size: 14px;
      line-height: 1.8;
      color: #555;
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
    }

    .resume-template.modern .skills-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .resume-template.modern .skill-category {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
    }

    .resume-template.modern .skill-category h4 {
      font-size: 14px;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 10px;
    }

    .resume-template.modern .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .resume-template.modern .skill-tag-preview {
      background: #3498db;
      color: #fff;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
    }

    .resume-template.modern .experience-item,
    .resume-template.modern .project-item,
    .resume-template.modern .education-item {
      margin-bottom: 25px;
      padding-left: 20px;
      border-left: 2px solid #37352f;
    }

    .resume-template.modern .item-header {
      margin-bottom: 10px;
    }

    .resume-template.modern .item-title {
      font-size: 16px;
      font-weight: 600;
      color: #2c3e50;
    }

    .resume-template.modern .item-subtitle {
      font-size: 14px;
      color: #3498db;
    }

    .resume-template.modern .item-date {
      font-size: 13px;
      color: #888;
    }

    .resume-template.modern .item-description {
      font-size: 14px;
      color: #555;
      line-height: 1.7;
    }

    .resume-template.modern .item-description ul {
      padding-left: 20px;
      margin: 10px 0;
    }

    .resume-template.modern .item-description li {
      margin-bottom: 5px;
    }

    .resume-template.modern .project-links {
      margin-top: 10px;
    }

    .resume-template.modern .project-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: #3498db;
      text-decoration: none;
      margin-right: 20px;
    }

    .resume-template.modern .tech-stack {
      margin-top: 10px;
      font-size: 13px;
      color: #666;
      background: #f0f0f0;
      padding: 8px 12px;
      border-radius: 4px;
    }

    /* 简历模板样式 - 简约模板 */
    .resume-template.minimal {
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    .resume-template.minimal .resume-header {
      margin-bottom: 30px;
    }

    .resume-template.minimal .resume-name {
      font-size: 28px;
      font-weight: 300;
      color: #fbfaf8;
      margin-bottom: 5px;
    }

    .resume-template.minimal .resume-title {
      font-size: 16px;
      color: #888;
      font-weight: 300;
      margin-bottom: 15px;
    }

    .resume-template.minimal .contact-info {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      font-size: 13px;
      color: #666;
    }

    .resume-template.minimal .section {
      margin-bottom: 25px;
    }

    .resume-template.minimal .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 15px;
    }

    .resume-template.minimal .summary-text {
      font-size: 14px;
      line-height: 1.8;
      color: #444;
    }

    .resume-template.minimal .skills-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .resume-template.minimal .skill-tag-preview {
      border: 1px solid #ddd;
      color: #555;
      padding: 5px 12px;
      border-radius: 3px;
      font-size: 12px;
    }

    .resume-template.minimal .experience-item,
    .resume-template.minimal .project-item,
    .resume-template.minimal .education-item {
      margin-bottom: 20px;
    }

    .resume-template.minimal .item-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .resume-template.minimal .item-title {
      font-size: 15px;
      font-weight: 500;
      color: #fbfaf8;
    }

    .resume-template.minimal .item-subtitle {
      font-size: 14px;
      color: #666;
    }

    .resume-template.minimal .item-date {
      font-size: 13px;
      color: #888;
    }

    .resume-template.minimal .item-description {
      font-size: 13px;
      color: #555;
      line-height: 1.7;
    }

    .resume-template.minimal .item-description ul {
      padding-left: 18px;
      margin: 8px 0;
    }

    .resume-template.minimal .project-link {
      font-size: 12px;
      color: #0066cc;
      text-decoration: none;
      margin-right: 15px;
    }

    .resume-template.minimal .tech-stack {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
    }

    /* 空状态提示 */
    .empty-hint {
      color: #aaa;
      font-style: italic;
      font-size: 13px;
    }

    /* Toast 通知 */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-secondary);
      color: var(--text-primary);
      padding: 15px 30px;
      border-radius: 8px;
      border: 2px solid var(--accent-main);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      z-index: 10000;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.success {
      border-color: var(--success);
    }

    .toast.error {
      border-color: var(--danger);
    }

    /* 页脚 */
    .footer {
      text-align: center;
      padding: 30px 0;
      margin-top: 40px;
      border-top: 1px solid var(--bg-tertiary);
      color: var(--text-tertiary);
    }

    .footer a {
      color: var(--accent-main);
      text-decoration: none;
    }

    .footer a:hover {
      color: var(--accent-light);
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.8em;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .toolbar-group {
        justify-content: center;
        flex-wrap: wrap;
      }

      .preview-content {
        padding: 20px;
      }

      .resume-template.modern .resume-header {
        margin: -20px -20px 20px -20px;
        padding: 20px;
      }

      .resume-template .skills-grid {
        grid-template-columns: 1fr !important;
      }
    }

    /* 打印样式 */
    @media print {
      body {
        background: #fff;
      }

      .container {
        max-width: 100%;
        padding: 0;
      }

      .nav-links,

<body>
  <div class="container">
    <!-- 导航 -->
    <div class="nav-links">
      <a href="/#/" class="back-link">← 返回主站</a>
      <a href="/tools/" class="back-link">← 返回工具集</a>
    </div>

    <!-- 头部 -->
    <div class="header">
      <h1>📄 程序员简历制作工具</h1>
      <p>专为技术人员打造的专业简历生成器，一键导出精美PDF</p>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
      <div class="toolbar-group">
        <label>选择模板：</label>
        <select id="templateSelect" onchange="changeTemplate()">
          <option value="classic">经典模板</option>
          <option value="modern">现代模板</option>
          <option value="minimal">简约模板</option>
        </select>
      </div>
      <div class="toolbar-group" style="flex: 1; justify-content: center; gap: 15px;">
        <button class="btn btn-secondary" onclick="loadSampleData()">
          <span>📋</span> 加载示例
        </button>
        <button class="btn btn-secondary" onclick="saveDraft()">
          <span>💾</span> 保存草稿
        </button>
        <button class="btn btn-secondary" onclick="loadDraft()">
          <span>📂</span> 加载草稿
        </button>
        <button class="btn btn-danger" onclick="clearAll()">
          <span>🗑️</span> 清空
        </button>
      </div>
      <div class="toolbar-group">
        <button class="btn btn-success" onclick="exportPDF()">
          <span>📥</span> 导出PDF
        </button>
      </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
      <!-- 编辑面板 -->
      <div class="edit-panel">
        <div class="panel-header">
          <span class="panel-title">✏️ 编辑简历内容</span>
        </div>
        <div class="panel-content">
          <!-- 基本信息 -->
          <div class="form-section">
            <div class="section-title">👤 基本信息</div>
            <div class="form-row">
              <div class="form-group">
                <label>姓名 *</label>
                <input type="text" id="name" placeholder="请输入姓名" oninput="updatePreview()">
              </div>
              <div class="form-group">
                <label>求职岗位 *</label>
                <input type="text" id="title" placeholder="如：Java高级开发工程师" oninput="updatePreview()">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>电话</label>
                <input type="tel" id="phone" placeholder="手机号码" oninput="updatePreview()">
              </div>
              <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="email" placeholder="email@example.com" oninput="updatePreview()">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>所在城市</label>
                <input type="text" id="location" placeholder="如：北京" oninput="updatePreview()">
              </div>
              <div class="form-group">
                <label>个人网站/博客</label>
                <input type="url" id="website" placeholder="https://your-blog.com" oninput="updatePreview()">
              </div>
            </div>
            <div class="form-group">
              <label>GitHub</label>
              <input type="url" id="github" placeholder="https://github.com/username" oninput="updatePreview()">
            </div>
          </div>

          <!-- 个人简介 -->
          <div class="form-section">
            <div class="section-title">📝 个人简介</div>
            <div class="form-group">
              <label>自我介绍（突出技术亮点和项目经验）</label>
              <textarea id="summary" placeholder="简要介绍您的技术背景、核心优势和职业目标..." oninput="updatePreview()"></textarea>
            </div>
          </div>

          <!-- 技术技能 -->
          <div class="form-section">
            <div class="section-title">💻 技术技能</div>
            <div class="form-group">
              <label>编程语言</label>
              <div class="skills-input-container" onclick="this.querySelector('input').focus()">
                <div id="languagesTags"></div>
                <input type="text" class="skills-input" id="languagesInput" placeholder="输入后按Enter添加" onkeydown="handleSkillInput(event, 'languages')">
              </div>
            </div>
            <div class="form-group">
              <label>框架/库</label>
              <div class="skills-input-container" onclick="this.querySelector('input').focus()">
                <div id="frameworksTags"></div>
                <input type="text" class="skills-input" id="frameworksInput" placeholder="输入后按Enter添加" onkeydown="handleSkillInput(event, 'frameworks')">
              </div>
            </div>
            <div class="form-group">
              <label>数据库</label>
              <div class="skills-input-container" onclick="this.querySelector('input').focus()">
                <div id="databasesTags"></div>
                <input type="text" class="skills-input" id="databasesInput" placeholder="输入后按Enter添加" onkeydown="handleSkillInput(event, 'databases')">
              </div>
            </div>
            <div class="form-group">
              <label>工具/平台</label>
              <div class="skills-input-container" onclick="this.querySelector('input').focus()">
                <div id="toolsTags"></div>
                <input type="text" class="skills-input" id="toolsInput" placeholder="输入后按Enter添加" onkeydown="handleSkillInput(event, 'tools')">
              </div>
            </div>
          </div>

          <!-- 工作经历 -->
          <div class="form-section">
            <div class="section-title">💼 工作经历</div>
            <div id="experienceList"></div>
            <button class="add-item-btn" onclick="addExperience()">+ 添加工作经历</button>
          </div>

          <!-- 项目经验 -->
          <div class="form-section">
            <div class="section-title">🚀 项目经验</div>
            <div id="projectList"></div>
            <button class="add-item-btn" onclick="addProject()">+ 添加项目经验</button>
          </div>

          <!-- 教育背景 -->
          <div class="form-section">
            <div class="section-title">🎓 教育背景</div>
            <div id="educationList"></div>
            <button class="add-item-btn" onclick="addEducation()">+ 添加教育经历</button>
          </div>
        </div>
      </div>

      <!-- 预览面板 -->
      <div class="preview-panel">
        <div class="panel-header">
          <span class="panel-title">👁️ 实时预览</span>
          <span style="color: var(--text-tertiary); font-size: 13px;">当前模板：<span id="currentTemplate">经典模板</span></span>
        </div>
        <div class="preview-content" id="previewContent">
          <div class="resume-template classic" id="resumePreview">
            <!-- 简历内容将在这里渲染 -->
          </div>
        </div>
      </div>
    </div>

    <!-- 页脚 -->
    <div class="footer">
      <p>© 2024-2026 wychmod Developer Workspace | 
        <a href="https://github.com/wychmod/wychmod.github.io" target="_blank">GitHub</a> | 
        <a href="/tools/">更多工具</a>
      </p>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // 数据存储
    const resumeData = {
      name: '',
      title: '',
      phone: '',
      email: '',
      location: '',
      website: '',
      github: '',
      summary: '',
      skills: {
        languages: [],
        frameworks: [],
        databases: [],
        tools: []
      },
      experiences: [],
      projects: [],
      education: []
    };

    let currentTemplate = 'classic';
    let experienceCounter = 0;
    let projectCounter = 0;
    let educationCounter = 0;

    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      // 尝试加载草稿
      const savedDraft = localStorage.getItem('resumeDraft');
      if (savedDraft) {
        try {
          const draft = JSON.parse(savedDraft);
          Object.assign(resumeData, draft);
          loadDataToForm();
          showToast('已自动加载上次保存的草稿', 'success');
        } catch (e) {
          console.error('加载草稿失败:', e);
        }
      }
      updatePreview();
    });

    // 显示Toast
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // 更新预览
    function updatePreview() {
      // 收集基本信息
      resumeData.name = document.getElementById('name').value;
      resumeData.title = document.getElementById('title').value;
      resumeData.phone = document.getElementById('phone').value;
      resumeData.email = document.getElementById('email').value;
      resumeData.location = document.getElementById('location').value;
      resumeData.website = document.getElementById('website').value;
      resumeData.github = document.getElementById('github').value;
      resumeData.summary = document.getElementById('summary').value;

      // 收集工作经历
      resumeData.experiences = collectListData('experience');
      
      // 收集项目经验
      resumeData.projects = collectListData('project');
      
      // 收集教育背景
      resumeData.education = collectListData('education');

      // 渲染预览
      renderPreview();
    }

    // 收集列表数据
    function collectListData(type) {
      const list = document.getElementById(type + 'List');
      const items = list.querySelectorAll('.list-item');
      const data = [];

      items.forEach(item => {
        const id = item.dataset.id;
        if (type === 'experience') {
          data.push({
            company: document.getElementById(`exp_company_${id}`)?.value || '',
            position: document.getElementById(`exp_position_${id}`)?.value || '',
            startDate: document.getElementById(`exp_start_${id}`)?.value || '',
            endDate: document.getElementById(`exp_end_${id}`)?.value || '',
            description: document.getElementById(`exp_desc_${id}`)?.value || ''
          });
        } else if (type === 'project') {
          data.push({
            name: document.getElementById(`proj_name_${id}`)?.value || '',
            role: document.getElementById(`proj_role_${id}`)?.value || '',
            startDate: document.getElementById(`proj_start_${id}`)?.value || '',
            endDate: document.getElementById(`proj_end_${id}`)?.value || '',
            description: document.getElementById(`proj_desc_${id}`)?.value || '',
            techStack: document.getElementById(`proj_tech_${id}`)?.value || '',
            github: document.getElementById(`proj_github_${id}`)?.value || '',
            demo: document.getElementById(`proj_demo_${id}`)?.value || ''
          });
        } else if (type === 'education') {
          data.push({
            school: document.getElementById(`edu_school_${id}`)?.value || '',
            degree: document.getElementById(`edu_degree_${id}`)?.value || '',
            major: document.getElementById(`edu_major_${id}`)?.value || '',
            startDate: document.getElementById(`edu_start_${id}`)?.value || '',
            endDate: document.getElementById(`edu_end_${id}`)?.value || ''
          });
        }
      });

      return data;
    }

    // 渲染预览
    function renderPreview() {
      const preview = document.getElementById('resumePreview');
      preview.className = 'resume-template ' + currentTemplate;

      let html = '';

      // 头部信息
      html += '<div class="resume-header">';
      html += `<div class="resume-name">${resumeData.name || '您的姓名'}</div>`;
      html += `<div class="resume-title">${resumeData.title || '求职岗位'}</div>`;
      html += '<div class="contact-info">';
      if (resumeData.phone) html += `<span class="contact-item">📱 ${resumeData.phone}</span>`;
      if (resumeData.email) html += `<span class="contact-item">📧 ${resumeData.email}</span>`;
      if (resumeData.location) html += `<span class="contact-item">📍 ${resumeData.location}</span>`;
      if (resumeData.website) html += `<span class="contact-item">🌐 <a href="${resumeData.website}" target="_blank">${resumeData.website.replace(/^https?:\/\//, '')}</a></span>`;
      if (resumeData.github) html += `<span class="contact-item">💻 <a href="${resumeData.github}" target="_blank">${resumeData.github.replace(/^https?:\/\//, '')}</a></span>`;
      html += '</div>';
      html += '</div>';

      // 个人简介
      if (resumeData.summary) {
        html += '<div class="section">';
        html += '<div class="section-title">个人简介</div>';
        html += `<div class="summary-text">${resumeData.summary.replace(/\n/g, '<br>')}</div>`;
        html += '</div>';
      }

      // 技术技能
      const hasSkills = resumeData.skills.languages.length || resumeData.skills.frameworks.length || 
                        resumeData.skills.databases.length || resumeData.skills.tools.length;
      if (hasSkills) {
        html += '<div class="section">';
        html += '<div class="section-title">技术技能</div>';
        if (currentTemplate === 'minimal') {
          html += '<div class="skills-grid">';
          [...resumeData.skills.languages, ...resumeData.skills.frameworks, 
           ...resumeData.skills.databases, ...resumeData.skills.tools].forEach(skill => {
            html += `<span class="skill-tag-preview">${skill}</span>`;
          });
          html += '</div>';
        } else {
          html += '<div class="skills-grid">';
          if (resumeData.skills.languages.length) {
            html += '<div class="skill-category"><h4>编程语言</h4><div class="skill-tags">';
            resumeData.skills.languages.forEach(s => html += `<span class="skill-tag-preview">${s}</span>`);
            html += '</div></div>';
          }
          if (resumeData.skills.frameworks.length) {
            html += '<div class="skill-category"><h4>框架/库</h4><div class="skill-tags">';
            resumeData.skills.frameworks.forEach(s => html += `<span class="skill-tag-preview">${s}</span>`);
            html += '</div></div>';
          }
          if (resumeData.skills.databases.length) {
            html += '<div class="skill-category"><h4>数据库</h4><div class="skill-tags">';
            resumeData.skills.databases.forEach(s => html += `<span class="skill-tag-preview">${s}</span>`);
            html += '</div></div>';
          }
          if (resumeData.skills.tools.length) {
            html += '<div class="skill-category"><h4>工具/平台</h4><div class="skill-tags">';
            resumeData.skills.tools.forEach(s => html += `<span class="skill-tag-preview">${s}</span>`);
            html += '</div></div>';
          }
          html += '</div>';
        }
        html += '</div>';
      }

      // 工作经历
      if (resumeData.experiences.length) {
        html += '<div class="section">';
        html += '<div class="section-title">工作经历</div>';
        resumeData.experiences.forEach(exp => {
          if (exp.company || exp.position) {
            html += '<div class="experience-item">';
            html += '<div class="item-header">';
            html += '<div>';
            html += `<div class="item-title">${exp.company || '公司名称'}</div>`;
            html += `<div class="item-subtitle">${exp.position || '职位'}</div>`;
            html += '</div>';
            html += `<div class="item-date">${exp.startDate || '开始时间'} - ${exp.endDate || '结束时间'}</div>`;
            html += '</div>';
            if (exp.description) {
              html += `<div class="item-description">${formatDescription(exp.description)}</div>`;
            }
            html += '</div>';
          }
        });
        html += '</div>';
      }

      // 项目经验
      if (resumeData.projects.length) {
        html += '<div class="section">';
        html += '<div class="section-title">项目经验</div>';
        resumeData.projects.forEach(proj => {
          if (proj.name || proj.description) {
            html += '<div class="project-item">';
            html += '<div class="item-header">';
            html += '<div>';
            html += `<div class="item-title">${proj.name || '项目名称'}</div>`;
            if (proj.role) html += `<div class="item-subtitle">${proj.role}</div>`;
            html += '</div>';
            if (proj.startDate || proj.endDate) {
              html += `<div class="item-date">${proj.startDate || ''} - ${proj.endDate || ''}</div>`;
            }
            html += '</div>';
            if (proj.description) {
              html += `<div class="item-description">${formatDescription(proj.description)}</div>`;
            }
            if (proj.techStack) {
              html += `<div class="tech-stack"><strong>技术栈：</strong>${proj.techStack}</div>`;
            }
            if (proj.github || proj.demo) {
              html += '<div class="project-links">';
              if (proj.github) html += `<a href="${proj.github}" target="_blank" class="project-link">📦 GitHub</a>`;
              if (proj.demo) html += `<a href="${proj.demo}" target="_blank" class="project-link">🔗 在线演示</a>`;
              html += '</div>';
            }
            html += '</div>';
          }
        });
        html += '</div>';
      }

      // 教育背景
      if (resumeData.education.length) {
        html += '<div class="section">';
        html += '<div class="section-title">教育背景</div>';
        resumeData.education.forEach(edu => {
          if (edu.school || edu.major) {
            html += '<div class="education-item">';
            html += '<div class="item-header">';
            html += '<div>';
            html += `<div class="item-title">${edu.school || '学校名称'}</div>`;
            html += `<div class="item-subtitle">${edu.degree || ''} ${edu.major || ''}</div>`;
            html += '</div>';
            html += `<div class="item-date">${edu.startDate || ''} - ${edu.endDate || ''}</div>`;
            html += '</div>';
            html += '</div>';
          }
        });
        html += '</div>';
      }

      preview.innerHTML = html || '<p class="empty-hint">开始填写左侧表单，预览将实时更新...</p>';
    }

    // 格式化描述（支持换行和列表）
    function formatDescription(text) {
      if (!text) return '';
      
      // 检测是否有列表项（以 - 或 * 开头的行）
      const lines = text.split('\n');
      const hasList = lines.some(line => /^\s*[-*•]\s/.test(line));
      
      if (hasList) {
        let html = '<ul>';
        lines.forEach(line => {
          const trimmed = line.trim();
          if (trimmed) {
            const content = trimmed.replace(/^[-*•]\s*/, '');
            html += `<li>${content}</li>`;
          }
        });
        html += '</ul>';
        return html;
      }
      
      return text.replace(/\n/g, '<br>');
    }

    // 技能输入处理
    function handleSkillInput(event, category) {
      if (event.key === 'Enter') {
        event.preventDefault();
        const input = event.target;
        const value = input.value.trim();
        
        if (value && !resumeData.skills[category].includes(value)) {
          resumeData.skills[category].push(value);
          renderSkillTags(category);
          input.value = '';
          updatePreview();
        }
      }
    }

    // 渲染技能标签
    function renderSkillTags(category) {
      const container = document.getElementById(category + 'Tags');
      container.innerHTML = resumeData.skills[category].map((skill, index) => 
        `<span class="skill-tag">${skill}<span class="remove-skill" onclick="removeSkill('${category}', ${index})">×</span></span>`
      ).join('');
    }

    // 移除技能
    function removeSkill(category, index) {
      resumeData.skills[category].splice(index, 1);
      renderSkillTags(category);
      updatePreview();
    }

    // 添加工作经历
    function addExperience() {
      const id = ++experienceCounter;
      const list = document.getElementById('experienceList');
      
      const item = document.createElement('div');
      item.className = 'list-item';
      item.dataset.id = id;
      item.innerHTML = `
        <div class="list-item-header">
          <span class="list-item-title">工作经历 #${id}</span>
          <div class="list-item-actions">
            <button class="btn btn-icon btn-danger" onclick="removeItem(this)" title="删除">🗑️</button>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>公司名称</label>
            <input type="text" id="exp_company_${id}" placeholder="公司名称" oninput="updatePreview()">
          </div>
          <div class="form-group">
            <label>职位</label>
            <input type="text" id="exp_position_${id}" placeholder="职位名称" oninput="updatePreview()">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>开始时间</label>
            <input type="text" id="exp_start_${id}" placeholder="如：2020.06" oninput="updatePreview()">
          </div>
          <div class="form-group">
            <label>结束时间</label>
            <input type="text" id="exp_end_${id}" placeholder="如：至今" oninput="updatePreview()">
          </div>
        </div>
        <div class="form-group">
          <label>工作内容（每行一条，以 - 开头可生成列表）</label>
          <textarea id="exp_desc_${id}" placeholder="- 负责核心业务模块的开发和维护\n- 优化系统性能，提升响应速度50%\n- 参与技术方案设计和代码评审" oninput="updatePreview()"></textarea>
        </div>
      `;
      
      list.appendChild(item);
      updatePreview();
    }

    // 添加项目经验
    function addProject() {
      const id = ++projectCounter;
      const list = document.getElementById('projectList');
      
      const item = document.createElement('div');
      item.className = 'list-item';
      item.dataset.id = id;
      item.innerHTML = `
        <div class="list-item-header">
          <span class="list-item-title">项目 #${id}</span>
          <div class="list-item-actions">
            <button class="btn btn-icon btn-danger" onclick="removeItem(this)" title="删除">🗑️</button>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>项目名称</label>
            <input type="text" id="proj_name_${id}" placeholder="项目名称" oninput="updatePreview()">
          </div>
          <div class="form-group">
            <label>担任角色</label>
            <input type="text" id="proj_role_${id}" placeholder="如：技术负责人" oninput="updatePreview()">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>开始时间</label>
            <input type="text" id="proj_start_${id}" placeholder="如：2021.01" oninput="updatePreview()">

      item.innerHTML = `

          <span class="list-item-title">教育经历 #${id}</span>
          <div class="list-item-actions">
            <button class="btn btn-icon btn-danger" onclick="removeItem(this)" title="删除">🗑️</button>

        </div>
        <div class="form-row">
          <div class="form-group">
            <label>学校名称</label>
            <input type="text" id="edu_school_${id}" placeholder="学校名称" oninput="updatePreview()">

          <div class="form-group">
            <label>学历</label>

        </div>

          <div class="form-group">
            <label>专业</label>

              <input type="text" id="edu_end_${id}" placeholder="结束" oninput="updatePreview()">

          </div>
        </div>

    // 保存草稿
    function saveDraft() {
      updatePreview(); // 确保数据是最新的
      localStorage.setItem('resumeDraft', JSON.stringify(resumeData));
      showToast('草稿已保存到本地', 'success');
    }

    // 加载草稿
    function loadDraft() {
      const savedDraft = localStorage.getItem('resumeDraft');
      if (!savedDraft) {
        showToast('没有找到保存的草稿', 'error');
        return;
      }

      try {
        const draft = JSON.parse(savedDraft);
        Object.assign(resumeData, draft);
        loadDataToForm();
        showToast('草稿已加载', 'success');
      } catch (e) {
        showToast('加载草稿失败', 'error');
      }
    }

    // 将数据加载到表单
    function loadDataToForm() {
      // 基本信息
      document.getElementById('name').value = resumeData.name || '';
      document.getElementById('title').value = resumeData.title || '';
      document.getElementById('phone').value = resumeData.phone || '';
      document.getElementById('email').value = resumeData.email || '';
      document.getElementById('location').value = resumeData.location || '';
      document.getElementById('website').value = resumeData.website || '';
      document.getElementById('github').value = resumeData.github || '';
      document.getElementById('summary').value = resumeData.summary || '';

      // 技能
      Object.keys(resumeData.skills).forEach(renderSkillTags);

      // 清空现有列表
      document.getElementById('experienceList').innerHTML = '';
      document.getElementById('projectList').innerHTML = '';
      document.getElementById('educationList').innerHTML = '';
      experienceCounter = 0;
      projectCounter = 0;
      educationCounter = 0;

      // 工作经历
      resumeData.experiences.forEach(exp => {
        addExperience();
        const id = experienceCounter;
        document.getElementById(`exp_company_${id}`).value = exp.company || '';
        document.getElementById(`exp_position_${id}`).value = exp.position || '';
        document.getElementById(`exp_start_${id}`).value = exp.startDate || '';
        document.getElementById(`exp_end_${id}`).value = exp.endDate || '';
        document.getElementById(`exp_desc_${id}`).value = exp.description || '';
      });

      // 项目经验
      resumeData.projects.forEach(proj => {
        addProject();
        const id = projectCounter;
        document.getElementById(`proj_name_${id}`).value = proj.name || '';
        document.getElementById(`proj_role_${id}`).value = proj.role || '';
        document.getElementById(`proj_start_${id}`).value = proj.startDate || '';
        document.getElementById(`proj_end_${id}`).value = proj.endDate || '';
        document.getElementById(`proj_desc_${id}`).value = proj.description || '';
        document.getElementById(`proj_tech_${id}`).value = proj.techStack || '';
        document.getElementById(`proj_github_${id}`).value = proj.github || '';

    // 清空所有
    function clearAll() {
      if (!confirm('确定要清空所有内容吗？此操作不可撤销。')) return;

      // 重置数据
      Object.keys(resumeData).forEach(key => {
        if (key === 'skills') {
          resumeData.skills = { languages: [], frameworks: [], databases: [], tools: [] };
        } else if (Array.isArray(resumeData[key])) {
          resumeData[key] = [];
        } else {
          resumeData[key] = '';
        }
      });

      // 清空表单
      document.querySelectorAll('input, textarea').forEach(el => el.value = '');
      document.getElementById('experienceList').innerHTML = '';
      document.getElementById('projectList').innerHTML = '';
      document.getElementById('educationList').innerHTML = '';
      Object.keys(resumeData.skills).forEach(renderSkillTags);
      
      experienceCounter = 0;
      projectCounter = 0;
      educationCounter = 0;

      updatePreview();
      showToast('已清空所有内容', 'success');
    }
