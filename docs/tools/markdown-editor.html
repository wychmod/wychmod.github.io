<head>
  <meta charset="UTF-8">

  <title>Markdown 编辑器 - wychmod Developer Workspace</title>
  <meta name="description" content="在线Markdown编辑器，支持实时预览、语法高亮、导出HTML和PDF功能">
  <meta name="keywords" content="Markdown编辑器,Markdown预览,在线编辑,HTML导出,PDF导出">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --accent-main: #6d4aff;
      --accent-light: #0b6bcb;
      --accent-dark: #5636d7;
      --bg-primary: #f7f6f3;
      --bg-secondary: #fbfaf8;
      --bg-tertiary: #ffffff;
      --text-primary: #37352f;
      --text-secondary: #5f5d57;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #f7f6f3 0%, #fbfaf8 50%, #fbfaf8 100%);
      color: var(--text-primary);
      padding: 20px;
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent-main);
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      padding: 10px 20px;
      border: 2px solid var(--accent-dark);
      border-radius: 25px;
      transition: all 0.3s ease;
      background: rgba(59, 130, 246, 0.1);
      margin-bottom: 20px;
    }

    .back-link:hover {
      color: var(--accent-light);
      border-color: var(--accent-light);
      transform: translateX(-5px);
      box-shadow: 0 4px 15px rgba(109, 74, 255, 0.12);
    }

    .header {
      text-align: center;
      padding: 25px 0;
      margin-bottom: 25px;
      border-bottom: 2px solid var(--accent-main);
    }

    .header h1 {
      color: var(--accent-light);
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(96, 165, 250, 0.3);
    }

    .header p {
      color: var(--text-secondary);
      font-size: 1.1em;
    }

    /* 工具栏 */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 15px;
      background: var(--bg-tertiary);
      border-radius: 12px 12px 0 0;
      border: 2px solid var(--accent-dark);
      border-bottom: none;
      align-items: center;
    }

    .toolbar-group {
      display: flex;
      gap: 5px;
      padding-right: 15px;
      border-right: 1px solid var(--accent-dark);
    }

    .toolbar-group:last-child {
      border-right: none;
      margin-left: auto;
    }

    .toolbar button {
      background: var(--bg-secondary);
      color: var(--accent-main);
      border: 1px solid var(--accent-dark);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .toolbar button:hover {
      background: rgba(109, 74, 255, 0.10);
      border-color: var(--accent-main);
      transform: translateY(-1px);
    }

    .toolbar button.primary {
      background: linear-gradient(135deg, var(--accent-dark), var(--accent-main));
      color: #fff;
      font-weight: 600;
    }

    .toolbar button.primary:hover {
      background: linear-gradient(135deg, var(--accent-main), var(--accent-light));
    }

    /* 编辑器容器 */
    .editor-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      background: var(--bg-secondary);
      border: 2px solid var(--accent-dark);
      border-radius: 0 0 12px 12px;
      overflow: hidden;
      min-height: 600px;
    }

    @media (max-width: 1024px) {
      .editor-container {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }
    }

    /* 编辑面板 */
    .editor-panel, .preview-panel {
      display: flex;
      flex-direction: column;
    }

    .editor-panel {
      border-right: 2px solid var(--accent-dark);
    }

    @media (max-width: 1024px) {
      .editor-panel {
        border-right: none;
        border-bottom: 2px solid var(--accent-dark);
      }
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--accent-dark);
    }

    .panel-title {
      color: var(--accent-main);
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-info {
      color: var(--text-secondary);
      font-size: 12px;
    }

    /* Markdown编辑器 */
    .markdown-input {
      flex: 1;
      width: 100%;
      background: var(--bg-primary);
      border: none;
      padding: 20px;
      color: var(--text-primary);
      font-family: 'Consolas', 'Monaco', 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.8;
      resize: none;
      tab-size: 2;
    }

    .markdown-input:focus {
      outline: none;
    }

    /* 预览区域 */
    .preview-content {
      flex: 1;
      padding: 20px;
      background: var(--bg-primary);
      overflow-y: auto;
      color: var(--text-primary);
    }

    /* Markdown 渲染样式 */
    .preview-content h1 {
      color: var(--accent-light);
      font-size: 2em;
      margin: 0 0 20px 0;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--accent-main);
    }

    .preview-content h2 {
      color: var(--accent-main);
      font-size: 1.6em;
      margin: 25px 0 15px 0;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--accent-dark);
    }

    .preview-content h3 {
      color: var(--accent-main);
      font-size: 1.3em;
      margin: 20px 0 12px 0;
    }

    .preview-content h4, .preview-content h5, .preview-content h6 {
      color: var(--text-primary);
      margin: 15px 0 10px 0;
    }

    .preview-content p {
      margin: 12px 0;
      line-height: 1.8;
    }

    .preview-content a {
      color: var(--accent-main);
      text-decoration: none;
    }

    .preview-content a:hover {
      color: var(--accent-light);
      text-decoration: underline;
    }

    .preview-content strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .preview-content em {
      font-style: italic;
      color: var(--text-secondary);
    }

    .preview-content code {
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent-main);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.9em;
    }

    .preview-content pre {
      background: var(--bg-secondary);
      border: 1px solid var(--accent-dark);
      border-radius: 8px;
      padding: 15px;
      overflow-x: auto;
      margin: 15px 0;
    }

    .preview-content pre code {
      background: none;
      padding: 0;
      color: var(--text-primary);
    }

    .preview-content blockquote {
      border-left: 4px solid var(--accent-main);
      background: rgba(59, 130, 246, 0.1);
      padding: 15px 20px;
      margin: 15px 0;
      border-radius: 0 8px 8px 0;
    }

    .preview-content blockquote p {
      margin: 0;
    }

    .preview-content ul, .preview-content ol {
      padding-left: 25px;
      margin: 12px 0;
    }

    .preview-content li {
      margin: 8px 0;
      line-height: 1.6;
    }

    .preview-content hr {
      border: none;
      border-top: 2px solid var(--accent-dark);
      margin: 25px 0;
    }

    .preview-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 15px 0;
    }

    .preview-content th {
      background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary));
      color: var(--accent-main);
      font-weight: 600;
      padding: 12px;
      text-align: left;
      border: 1px solid var(--accent-dark);
    }

    .preview-content td {
      padding: 10px 12px;
      border: 1px solid var(--accent-dark);
    }

    .preview-content tr:nth-child(even) {
      background: rgba(109, 74, 255, 0.05);
    }

    .preview-content img {
      max-width: 100%;
      border-radius: 8px;
      margin: 15px 0;
    }

    .preview-content .task-list {
      padding-left: 0;
      margin: 12px 0;
    }

    .preview-content .task-list-item {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 24px;
      list-style: none;
      margin-left: 0;
    }

    .preview-content .task-list-item input[type="checkbox"] {
      width: 16px !important;
      height: 16px !important;
      min-height: 16px !important;
      flex: 0 0 16px;
      margin: 0 !important;
      padding: 0 !important;
      border: 1px solid #bdb8af !important;
      border-radius: 4px !important;
      box-shadow: none !important;
      background: initial !important;
      appearance: auto !important;
      accent-color: var(--accent-main);
      cursor: default;
    }

    /* Toast通知 */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: linear-gradient(135deg, var(--bg-secondary), var(--bg-tertiary));
      border: 2px solid var(--accent-main);
      border-radius: 12px;
      padding: 15px 25px;
      color: var(--text-primary);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
      z-index: 1000;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success {
      border-color: #4caf50;
    }

    .toast.error {
      border-color: #f44336;
    }

    /* 帮助提示 */
    .help-section {
      margin-top: 25px;
      background: rgba(59, 130, 246, 0.1);
      border: 2px solid var(--accent-dark);
      border-radius: 12px;
      padding: 25px;
    }

    .help-section h3 {
      color: var(--accent-light);
      margin-bottom: 15px;
      font-size: 1.2em;
    }

    .syntax-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .syntax-item {
      background: var(--bg-secondary);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--accent-dark);
    }

    .syntax-item code {
      color: var(--accent-main);
      font-family: monospace;
      font-size: 13px;
    }

    .syntax-item span {
      color: var(--text-secondary);
      font-size: 12px;
      display: block;
      margin-top: 5px;
    }

    /* 页脚 */
    .footer {
      text-align: center;
      padding: 30px 20px;
      margin-top: 40px;
      border-top: 1px solid var(--bg-tertiary);
      color: var(--text-secondary);
    }

    .footer a {
      color: var(--accent-main);
      text-decoration: none;
    }

    .footer a:hover {
      color: var(--accent-light);
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.8em;
      }

      .toolbar {
        padding: 10px;
      }

      .toolbar-group {
        padding-right: 10px;
      }

      .toolbar button {
        padding: 6px 10px;
        font-size: 13px;
      }

      .editor-container {
        min-height: 400px;
      }
    }
  </style>

  <script>
    // 默认Markdown示例
    const defaultMarkdown = `# Markdown 编辑器演示

  return true;

### 链接和图片

这是一个 [链接示例](https://github.com)。

图片示例：
![示例图片](https://via.placeholder.com/400x200/1a1a1a/d4af37?text=Markdown+Editor)

### 分隔线

---

## 高级功能

本编辑器支持：
- ✅ 实时预览
- ✅ 语法高亮
- ✅ 导出 HTML
- ✅ 导出 PDF

    // DOM元素
    const markdownInput = document.getElementById('markdownInput');
    const previewContent = document.getElementById('previewContent');
    const charCount = document.getElementById('charCount');
    const wordCount = document.getElementById('wordCount');
    const toast = document.getElementById('toast');

    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      markdownInput.value = defaultMarkdown;
      updatePreview();
      updateCounts();
      
      // 实时预览
      markdownInput.addEventListener('input', function() {
        updatePreview();
        updateCounts();
      });
      
      // 快捷键支持
      markdownInput.addEventListener('keydown', handleKeyboard);
      
      // Tab键支持
      markdownInput.addEventListener('keydown', function(e) {
        if (e.key === 'Tab') {
          e.preventDefault();
          insertAtCursor('  ');
        }
      });
    });

    // 更新预览
    function updatePreview() {
      const markdown = markdownInput.value;
      const html = parseMarkdown(markdown);
      previewContent.innerHTML = html;
    }

    // 更新字数统计
    function updateCounts() {
      const text = markdownInput.value;
      const plainText = markdownToPlainText(text);
      charCount.textContent = `Markdown ${text.length.toLocaleString()} 字符`;
      wordCount.textContent = `纯文本 ${plainText.length.toLocaleString()} 字符`;
    }

    function markdownToPlainText(markdown) {
      return markdown
        .replace(/```[\s\S]*?```/g, '')
        .replace(/!\[[^\]]*\]\([^)]+\)/g, '')
        .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
        .replace(/[`*_~>#|\-\[\]()]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    // Markdown解析器
    function parseMarkdown(md) {
      let html = md;
      
      // 转义HTML特殊字符（在代码块之外）
      // 先处理代码块，保护其内容
      const codeBlocks = [];
      html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (match, lang, code) => {
        const index = codeBlocks.length;
        codeBlocks.push(`<pre><code class="language-${lang}">${escapeHtml(code.trim())}</code></pre>`);
        return `___CODEBLOCK_${index}___`;
      });
      
      // 行内代码
      const inlineCodes = [];
      html = html.replace(/`([^`]+)`/g, (match, code) => {
        const index = inlineCodes.length;
        inlineCodes.push(`<code>${escapeHtml(code)}</code>`);
        return `___INLINECODE_${index}___`;
      });

      // 标题
      html = html.replace(/^###### (.+)$/gm, '<h6>$1</h6>');
      html = html.replace(/^##### (.+)$/gm, '<h5>$1</h5>');
      html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

      // 分隔线
      html = html.replace(/^---+$/gm, '<hr>');
      html = html.replace(/^\*\*\*+$/gm, '<hr>');

      // 引用块
      html = html.replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>');
      html = html.replace(/<\/blockquote>\n<blockquote>/g, '\n');

      // 任务列表
      html = html.replace(/^- \[x\] (.+)$/gm, '<li class="task-list-item"><input type="checkbox" checked disabled> $1</li>');
      html = html.replace(/^- \[ \] (.+)$/gm, '<li class="task-list-item"><input type="checkbox" disabled> $1</li>');
      html = html.replace(/(<li class="task-list-item">.*<\/li>\n?)+/g, '<ul class="task-list">$&</ul>');

      // 无序列表
      html = html.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

      // 有序列表
      html = html.replace(/^\d+\. (.+)$/gm, '<oli>$1</oli>');
      html = html.replace(/(<oli>.*<\/oli>\n?)+/g, match => {
        return '<ol>' + match.replace(/<\/?oli>/g, m => m === '<oli>' ? '<li>' : '</li>') + '</ol>';
      });

      // 表格
      html = html.replace(/^\|(.+)\|\n\|[-:\| ]+\|\n((\|.+\|\n?)+)/gm, (match, header, sep, body) => {
        const headers = header.split('|').filter(h => h.trim()).map(h => `<th>${h.trim()}</th>`).join('');
        const rows = body.trim().split('\n').map(row => {
          const cells = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
          return `<tr>${cells}</tr>`;
        }).join('');
        return `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
      });

      // 图片
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');

      // 链接
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

      // 粗体和斜体
      html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');

      // 段落
      html = html.replace(/\n\n+/g, '</p><p>');
      html = '<p>' + html + '</p>';
      html = html.replace(/<p>\s*<(h[1-6]|ul|ol|blockquote|pre|hr|table)/g, '<$1');
      html = html.replace(/<\/(h[1-6]|ul|ol|blockquote|pre|hr|table)>\s*<\/p>/g, '</$1>');
      html = html.replace(/<p>\s*<\/p>/g, '');

      // 还原代码块
      codeBlocks.forEach((block, index) => {
        html = html.replace(`___CODEBLOCK_${index}___`, block);
      });
      
      // 还原行内代码
      inlineCodes.forEach((code, index) => {
        html = html.replace(`___INLINECODE_${index}___`, code);
      });

      return html;
    }

    // HTML转义
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // 在光标位置插入文本
    function insertAtCursor(text) {
      const start = markdownInput.selectionStart;
      const end = markdownInput.selectionEnd;
      const value = markdownInput.value;
      
      markdownInput.value = value.substring(0, start) + text + value.substring(end);
      markdownInput.selectionStart = markdownInput.selectionEnd = start + text.length;
      markdownInput.focus();
      updatePreview();
      updateCounts();
    }

    // 插入包围文本
    function insertText(before, after) {
      const start = markdownInput.selectionStart;
      const end = markdownInput.selectionEnd;
      const value = markdownInput.value;
      const selectedText = value.substring(start, end) || '文本';
      
      markdownInput.value = value.substring(0, start) + before + selectedText + after + value.substring(end);
      markdownInput.selectionStart = start + before.length;
      markdownInput.selectionEnd = start + before.length + selectedText.length;
      markdownInput.focus();
      updatePreview();
      updateCounts();
    }

    // 插入标题
    function insertHeading(level) {
      const prefix = '#'.repeat(level) + ' ';
      const start = markdownInput.selectionStart;
      const value = markdownInput.value;
      
      // 找到当前行的开始
      let lineStart = start;
      while (lineStart > 0 && value[lineStart - 1] !== '\n') {
        lineStart--;
      }
      
      // 检查是否已有标题符号
      const lineContent = value.substring(lineStart);
      const existingMatch = lineContent.match(/^#+\s*/);
      
      if (existingMatch) {
        // 替换现有标题符号
        markdownInput.value = value.substring(0, lineStart) + prefix + lineContent.substring(existingMatch[0].length);
      } else {
        // 添加标题符号
        markdownInput.value = value.substring(0, lineStart) + prefix + value.substring(lineStart);
      }
      
      markdownInput.focus();
      updatePreview();
      updateCounts();
    }

    // 插入列表
    function insertList(type) {
      let prefix;
      switch(type) {
        case 'ul': prefix = '- '; break;
        case 'ol': prefix = '1. '; break;
        case 'task': prefix = '- [ ] '; break;
      }
      insertAtCursor('\n' + prefix + '列表项\n');
    }

    // 插入链接
    function insertLink() {
      const url = prompt('请输入链接地址:', 'https://');
      if (url) {
        insertText('[', `](${url})`);
      }
    }

    // 插入图片
    function insertImage() {
      const url = prompt('请输入图片地址:', 'https://');
      if (url) {
        insertAtCursor(`![图片描述](${url})`);
      }
    }

    // 插入表格
    function insertTable() {
      const table = `
| 表头1 | 表头2 | 表头3 |
|-------|-------|-------|
| 单元格 | 单元格 | 单元格 |
| 单元格 | 单元格 | 单元格 |
`;
      insertAtCursor(table);
    }

    // 插入代码块
    function insertCodeBlock() {
      const lang = prompt('请输入编程语言 (如 javascript, python):', 'javascript');
      insertAtCursor('\n```' + (lang || '') + '\n// 代码\n```\n');
    }

    // 插入引用
    function insertQuote() {
      insertAtCursor('\n> 引用文本\n');
    }

    // 插入分隔线
    function insertHr() {
      insertAtCursor('\n---\n');
    }

    // 快捷键处理
    function handleKeyboard(e) {
      if (e.ctrlKey || e.metaKey) {
        switch(e.key.toLowerCase()) {
          case 'b':
            e.preventDefault();
            insertText('**', '**');
            break;
          case 'i':
            e.preventDefault();
            insertText('*', '*');
            break;
          case 'k':
            e.preventDefault();
            insertLink();
            break;
        }
      }
    }

    // 导出HTML
    function exportHTML() {
      const markdown = markdownInput.value;
      const htmlContent = parseMarkdown(markdown);
      
      const fullHtml = `<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

      downloadFile(fullHtml, 'markdown-export.html', 'text/html');
      showToast('HTML 导出成功', 'success');
    }

    // 导出PDF
    function exportPDF() {
      const markdown = markdownInput.value;
      const htmlContent = parseMarkdown(markdown);
      
      // 创建打印窗口
      const printWindow = window.open('', '_blank');
      printWindow.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="UTF-8">
          <title>Markdown 导出<\/title>
          <style>
            body {
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
              max-width: 800px;
              margin: 0 auto;
              padding: 40px;
              line-height: 1.6;
              color: #333;
            }
            h1 { border-bottom: 2px solid #6d4aff; padding-bottom: 10px; }
            h2 { border-bottom: 1px solid #ddd; padding-bottom: 8px; }

              body { padding: 20px; }
            }
          <\/style>
        <\/head>
        <body>

          <script>
            window.onload = function() {
              window.print();
            };

        <\/html>
      `);
      printWindow.document.close();
      
      showToast('请在打印对话框中选择"保存为PDF"', 'success');
    }

    // 下载文件
    function downloadFile(content, filename, type) {
      const blob = new Blob([content], { type: type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // 清空编辑器
    function clearEditor() {
      if (confirm('确定要清空编辑器吗？')) {
        markdownInput.value = '';
        updatePreview();
        updateCounts();
        showToast('编辑器已清空', 'success');
      }
    }

    // Toast通知
    function showToast(message, type = 'success') {
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }
  </script>
</body>
